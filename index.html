<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinema Bulutu ☁️🎬</title>
    <style>
        /* Arka planı neşeli stickerlarla dolduruyoruz */
        body { 
            background: #2c3e50; 
            background-image: 
                url('https://www.transparenttextures.com/patterns/black-paper.png'),
                linear-gradient(rgba(44, 62, 80, 0.9), rgba(44, 62, 80, 0.9));
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden;
            position: relative;
        }

        /* Dekoratif Stickerlar (Rastgele yerleştirilmiş ikonlar) */
        .sticker { position: absolute; font-size: 3rem; opacity: 0.2; z-index: -1; animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .main-container {
            text-align: center; z-index: 1; width: 90%; max-width: 500px;
        }

        /* Bulut Şeklinde Buton Tasarımı */
        .cloud-btn {
            background: #fff; color: #333; border: none;
            padding: 25px 50px; font-size: 1.5rem; font-weight: bold;
            cursor: pointer; position: relative;
            border-radius: 50px; /* Temel yuvarlaklık */
            box-shadow: 10px 10px 0px #e50914;
            transition: 0.3s;
            display: inline-block;
        }

        /* Bulutun yan tümsekleri için ufak dokunuşlar */
        .cloud-btn::after, .cloud-btn::before {
            content: ''; position: absolute; background: #fff; border-radius: 50%; z-index: -1;
        }
        .cloud-btn::after { width: 50px; height: 50px; top: -20px; left: 30px; }
        .cloud-btn::before { width: 40px; height: 40px; top: -10px; right: 30px; }

        .cloud-btn:hover { transform: scale(1.1); box-shadow: 15px 15px 0px #b20710; }
        .cloud-btn:active { transform: scale(0.9); }

        #movie-box {
            font-size: 2rem; margin-top: 50px; min-height: 120px;
            background: rgba(255,255,255,0.1); padding: 20px;
            border-radius: 20px; border: 2px dashed #f1c40f;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <!-- Arka plan stickerları -->
    <div class="sticker" style="top:10%; left:10%;">🍿</div>
    <div class="sticker" style="top:20%; right:15%;">📺</div>
    <div class="sticker" style="bottom:15%; left:15%;">🎬</div>
    <div class="sticker" style="bottom:10%; right:10%;">🎟️</div>
    <div class="sticker" style="top:50%; left:5%;">🎥</div>
    <div class="sticker" style="top:40%; right:5%;">🎞️</div>

    <div class="main-container">
        <h1 style="color: #f1c40f; text-shadow: 2px 2px #000;">☁️ SİNEMA BULUTU ☁️</h1>
        
        <button class="cloud-btn" onclick="kura()">FİLM SEÇ</button>

        <div id="movie-box">Şansını dene!</div>
    </div>

    <script>
        const arsiv = [
            "Inception (2010)", "Interstellar (2014)", "The Dark Knight (2008)", 
            "Dune: Part Two (2024)", "Parasite (2019)", "Joker (2019)",
            "Spider-Man: Across the Spider-Verse (2023)", "Everything Everywhere All at Once (2022)",
            "The Wolf of Wall Street (2013)", "Mad Max: Fury Road (2015)", "Whiplash (2014)",
            "Soul (2020)", "Inside Out (2015)", "Coco (2017)", "Arrival (2016)",
            "The Batman (2022)", "Top Gun: Maverick (2022)", "Oppenheimer (2023)",
            "Babam ve Oğlum (2005)", "G.O.R.A (2004)", "7. Koğuştaki Mucize (2019)",
            "Ölümlü Dünya (2018)", "Cinayet Süsü (2019)", "Bursa Bülbülü (2023)"
        ];

        function kura() {
            const box = document.getElementById("movie-box");
            let i = 0;
            box.style.color = "#f1c40f";
            
            const interval = setInterval(() => {
                box.innerText = arsiv[Math.floor(Math.random() * arsiv.length)];
                i++;
                if(i > 15) {
                    clearInterval(interval);
                    box.style.color = "#fff";
                    box.innerText = "✨ " + arsiv[Math.floor(Math.random() * arsiv.length)] + " ✨";
                }
            }, 70);
        }
    </script>
</body>
</html>
