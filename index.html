<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinema Bulutu ☁️🎬</title>
    <style>
        body { 
            /* Arka plana senin gönderdiğin görseli ekliyoruz */
            background: url('https://i.ibb.co/3pYf9yB/smiley-pattern.jpg'); /* Örnek linktir, kendi görsel linkini de kullanabilirsin */
            background-image: url('https://i.pinimg.com/originals/9e/3d/8c/9e3d8c1998f48358485292c72b2a64c4.jpg'); /* Benzer bir pattern linki koydum */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden;
            position: relative;
        }

        /* İçeriğin okunması için arka plana hafif bir karartma ekleyelim */
        body::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); z-index: 0;
        }

        .main-container {
            text-align: center; z-index: 1; width: 90%; max-width: 500px;
            background: rgba(0, 0, 0, 0.6); /* Yazıların okunması için siyah şeffaf kutu */
            padding: 30px; border-radius: 30px; border: 3px solid #f1c40f;
        }

        .cloud-btn {
            background: #fff; color: #333; border: none;
            padding: 20px 40px; font-size: 1.5rem; font-weight: bold;
            cursor: pointer; position: relative;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
            display: inline-block;
            margin-top: 10px;
        }

        .cloud-btn:hover { transform: translateY(-5px); box-shadow: 0 15px 25px rgba(0,0,0,0.4); }

        #movie-box {
            font-size: 1.8rem; margin-top: 30px; min-height: 100px;
            color: #f1c40f; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            text-shadow: 2px 2px 4px #000;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 style="color: #f1c40f; text-shadow: 2px 2px #000; margin-bottom: 20px;">🎬 SİNEMA BULUTU 🎬</h1>
        
        <button class="cloud-btn" onclick="kura()">FİLM SEÇ ✨</button>

        <div id="movie-box">Hadi şansını dene!</div>
    </div>

    <script>
        const arsiv = [
            "Inception (2010)", "Interstellar (2014)", "The Dark Knight (2008)", 
            "Dune: Part Two (2024)", "Parasite (2019)", "Joker (2019)",
            "Spider-Man: Across the Spider-Verse (2023)", "Everything Everywhere All at Once (2022)",
            "The Wolf of Wall Street (2013)", "Mad Max: Fury Road (2015)", "Whiplash (2014)",
            "Soul (2020)", "Inside Out (2015)", "Coco (2017)", "Arrival (2016)",
            "The Batman (2022)", "Top Gun: Maverick (2022)", "Oppenheimer (2023)",
            "Ayla (2017)", "G.O.R.A (2004)", "7. Koğuştaki Mucize (2019)",
            "Ölümlü Dünya (2018)", "Cinayet Süsü (2019)", "Bursa Bülbülü (2023)"
        ];

        function kura() {
            const box = document.getElementById("movie-box");
            let i = 0;
            const interval = setInterval(() => {
                box.innerText = arsiv[Math.floor(Math.random() * arsiv.length)];
                i++;
                if(i > 15) {
                    clearInterval(interval);
                    box.innerText = "⭐ " + arsiv[Math.floor(Math.random() * arsiv.length)] + " ⭐";
                }
            }, 60);
        }
    </script>
</body>
</html> 
</body>
</html>
